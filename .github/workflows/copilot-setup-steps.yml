name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual testing via the Actions tab
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # This job MUST be called `copilot-setup-steps` to be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Confirm skill files are present
              run: |
                echo "=== 张雪峰-skill v2.0 environment ready ==="
                echo "SKILL.md size: $(wc -c < SKILL.md) bytes"
                echo "Examples: $(ls examples/)"
                echo "References: $(ls references/research/)"
